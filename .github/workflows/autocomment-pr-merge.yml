name: 🔒 Auto Comment on PR Closed

on:
    pull_request_target:
        types: [closed]

permissions:
    issues: write
    pull-requests: write
    contents: read

jobs:
    comment-on-pr-close:
        runs-on: ubuntu-latest
        steps:
            - name: 🔍 Check if PR is from a fork
              id: check
              run: |
                  if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
                    echo "is_fork=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "is_fork=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: 💬 Post comment on closed forked PR
              if: steps.check.outputs.is_fork == 'true'
              uses: actions/github-script@v9
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const prNumber = context.payload.pull_request.number;
                      const prTitle = context.payload.pull_request.title;
                      const prCloser = context.actor;
                      const prAuthor = context.payload.pull_request.user.login;
                      const merged = context.payload.pull_request.merged;

                      let message;
                      if (merged) {
                        message = `🎉 Congratulations @${prAuthor}! Your Pull Request **"${prTitle}"** has been successfully merged by @${prCloser}. 
                        
                        Thank you for your valuable contribution to **SahiDawa**! 🇮🇳 
                        If this was for **GSSoC 2026**, your work is officially merged and valid. Keep up the great work and feel free to claim other open issues. 🚀
                        
                        Follow us on LinkedIn: https://www.linkedin.com/company/ratloopz/ to get shoutout`;
                      } else {
                        message = `📪 Hi @${prAuthor}. Your Pull Request **"${prTitle}"** was closed by @${prCloser} without being merged. 
                        
                        Don't worry! This usually happens if the issue was already resolved, the PR was inactive, or if it didn't align with our current roadmap.
                        If you have any questions or feel this was a mistake, please reach out to us on [Discord](https://discord.gg/dvbDuJVwNa). Thanks for your effort! 🙌`;
                      }

                      await github.rest.issues.createComment({
                        issue_number: prNumber,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: message
                      });
