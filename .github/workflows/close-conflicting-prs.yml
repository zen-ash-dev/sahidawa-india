name: "Merge Conflict Auto-Closer"

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  workflow_dispatch: # Allows manual execution

permissions:
  pull-requests: write
  issues: write

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Audit Pull Requests for Merge Conflicts
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = context.repo;
            const LABEL_NAME = 'merge-conflict';
            const GRACE_PERIOD_MS = 12 * 60 * 60 * 1000; // 12 hours in milliseconds

            console.log("Fetching all open pull requests...");
            const pulls = await github.rest.pulls.list({
              owner: repo.owner,
              repo: repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const pr of pulls.data) {
              const prNumber = pr.number;
              const username = pr.user.login;

              // Fetch detailed PR information to retrieve the mergeable state
              let isMergeable = null;
              let retries = 3;
              
              while (retries > 0) {
                const prDetails = await github.rest.pulls.get({
                  owner: repo.owner,
                  repo: repo.repo,
                  pull_number: prNumber
                });
                
                isMergeable = prDetails.data.mergeable;
                
                if (isMergeable !== null) break;
                
                console.log(`PR #${prNumber} mergeable is null. Retrying in 3 seconds...`);
                await new Promise(r => setTimeout(r, 3000));
                retries--;
              }
              const hasConflictLabel = pr.labels.some(l => l.name === LABEL_NAME);

              console.log(`PR #${prNumber} by @${username}: mergeable = ${isMergeable}, hasConflictLabel = ${hasConflictLabel}`);

              // Case 1: Merge conflict exists (mergeable is false)
              if (isMergeable === false) {
                if (!hasConflictLabel) {
                  // Add warning label and post warning comment
                  console.log(`Adding warning to PR #${prNumber}...`);
                  
                  await github.rest.issues.addLabels({
                    owner: repo.owner,
                    repo: repo.repo,
                    issue_number: prNumber,
                    labels: [LABEL_NAME]
                  });

                  await github.rest.issues.createComment({
                    owner: repo.owner,
                    repo: repo.repo,
                    issue_number: prNumber,
                    body: `Merge conflict detected.\n\n@${username}, please resolve the conflicts locally and update your branch within 12 hours. If unresolved, this PR will be closed.`
                  });
                } else {
                  // Conflict label already exists, check duration
                  console.log(`Checking conflict duration for PR #${prNumber}...`);
                  
                  // Fetch issue events to find when the label was added
                  const events = await github.rest.issues.listEvents({
                    owner: repo.owner,
                    repo: repo.repo,
                    issue_number: prNumber,
                    per_page: 100
                  });

                  const labelEvent = events.data
                    .filter(e => e.event === 'labeled' && e.label && e.label.name === LABEL_NAME)
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

                  if (labelEvent) {
                    const labelTime = new Date(labelEvent.created_at).getTime();
                    const now = Date.now();
                    const elapsed = now - labelTime;

                    console.log(`PR #${prNumber}: Label added ${Math.round(elapsed / (60 * 1000))} minutes ago.`);

                    if (elapsed >= GRACE_PERIOD_MS) {
                      console.log(`Closing PR #${prNumber} due to unresolved merge conflicts.`);

                      await github.rest.issues.createComment({
                        owner: repo.owner,
                        repo: repo.repo,
                        issue_number: prNumber,
                        body: `Pull Request closed due to unresolved merge conflicts.\n\n@${username}, conflicts were not resolved within the 12-hour grace period. Please resolve the conflicts locally and submit a new PR.`
                      });

                      await github.rest.pulls.update({
                        owner: repo.owner,
                        repo: repo.repo,
                        pull_number: prNumber,
                        state: 'closed'
                      });
                    }
                  }
                }
              }
              // Case 2: No conflicts (mergeable is true/null), clean up label if it was present
              else if (isMergeable === true && hasConflictLabel) {
                console.log(`Conflicts resolved for PR #${prNumber}. Removing warning label.`);
                try {
                  await github.rest.issues.removeLabel({
                    owner: repo.owner,
                    repo: repo.repo,
                    issue_number: prNumber,
                    name: LABEL_NAME
                  });
                  
                  await github.rest.issues.createComment({
                    owner: repo.owner,
                    repo: repo.repo,
                    issue_number: prNumber,
                    body: `@${username}, merge conflicts have been resolved.`
                  });
                } catch (err) {
                  console.log(`Failed to remove label or post comment: ${err.message}`);
                }
              }
            }
