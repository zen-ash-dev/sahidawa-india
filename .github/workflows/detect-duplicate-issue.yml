name: 🛡️ Issue Quality & Duplicate Guard

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-guard-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  validate-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Issue Quality and Duplicates
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = issue.user.login;
            const title = (issue.title || '').trim();
            const body = (issue.body || '').trim();

            // ─────────────────────────────────────────────
            // 1. Ignore bots
            // ─────────────────────────────────────────────
            if (issue.user.type === 'Bot') {
              core.info('Ignoring bot issue.');
              return;
            }

            // ─────────────────────────────────────────────
            // 2. Ignore research/exempt issues
            // ─────────────────────────────────────────────
            const labels = (issue.labels || []).map(l => l.name.toLowerCase());
            if (labels.includes('research')) {
              core.info('Research issue detected. Skipping validation.');
              return;
            }

            // ─────────────────────────────────────────────
            // 3. Issue Quality Check 
            //    (No more AI Keyword Bans. Just check detail depth)
            // ─────────────────────────────────────────────
            if (title.length < 10 || body.length < 30) {
              core.info('Issue lacks minimum quality details.');

              // Check if we already warned
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number, per_page: 100
              });
              const alreadyWarned = comments.some(c => c.user.type === 'Bot' && c.body.includes('Issue quality check failed'));

              if (!alreadyWarned) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `Issue quality check failed.\n\n` +
                        `@${username}, this issue lacks sufficient detail for maintainers to take action.\n\n` +
                        `Please edit the issue description to provide:\n` +
                        `- Clear explanation or reproduction steps\n` +
                        `- Expected vs actual behavior\n` +
                        `- Technical implementation details or context`
                });

                await github.rest.issues.addLabels({
                  owner, repo, issue_number, labels: ['needs-details']
                });
              }
            }

            // ─────────────────────────────────────────────
            // 4. Smart Duplicate Detection (Jaccard Similarity)
            // ─────────────────────────────────────────────
            // Fetch ALL issues (open AND closed)
            const allIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'all', per_page: 100
            });

            // Normalization: Extract words > 2 chars, stripping standard prefixes and common boilerplate words
            const getWords = str => {
              let clean = str.toLowerCase();
              // Remove brackets like [BUG], [FEATURE], [UI/UX]
              clean = clean.replace(/\[[^\]]+\]/g, '');
              // Remove prefix commit tags like feat:, fix:, docs:, etc.
              clean = clean.replace(/^[a-z0-9\-_]+(\([^)]+\))?:/g, '');
              
              const words = clean.replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/).filter(w => w.length > 2);
              
              // Filter out common boilerplate words that don't add semantic value
              const stopwords = new Set([
                'add', 'create', 'setup', 'implement', 'build', 'integrate', 'enforce', 'resolve',
                'fix', 'bug', 'feature', 'page', 'issue', 'shows', 'error', 'fails', 'failing',
                'broken', 'working', 'properly', 'incorrectly', 'incorrect'
              ]);
              return words.filter(w => !stopwords.has(w));
            };
            
            // Jaccard similarity algorithm (Bag of Words)
            function calculateSimilarity(wordsA, wordsB) {
              if (wordsA.length === 0 || wordsB.length === 0) return 0;
              const setA = new Set(wordsA);
              const setB = new Set(wordsB);
              const intersection = new Set([...setA].filter(x => setB.has(x)));
              const union = new Set([...setA, ...setB]);
              return intersection.size / union.size;
            }

            const currentWords = getWords(title);
            let duplicateIssue = null;
            let highestSimilarity = 0;

            for (const existing of allIssues) {
              if (existing.number === issue_number) continue;
              if (existing.pull_request) continue; // Ignore PRs

              const existingLabels = (existing.labels || []).map(l => l.name.toLowerCase());
              if (existingLabels.includes('research')) continue;

              const existingWords = getWords(existing.title || '');
              
              // Exact match
              if (existingWords.join(' ') === currentWords.join(' ') && currentWords.length > 0) {
                duplicateIssue = existing;
                break;
              }

              // Semantic Similarity Check (50% word overlap required after stripping boilerplate)
              const sim = calculateSimilarity(currentWords, existingWords);
              if (sim > 0.50 && sim > highestSimilarity) {
                highestSimilarity = sim;
                duplicateIssue = existing;
              }
            }

            if (duplicateIssue) {
              core.info(`Duplicate detected: #${duplicateIssue.number} (Similarity: ${highestSimilarity.toFixed(2)})`);

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number, per_page: 100
              });
              const alreadyFlagged = comments.some(c => c.user.type === 'Bot' && c.body.includes('Possible Duplicate Issue Detected'));

              if (!alreadyFlagged) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `Possible Duplicate Issue.\n\n` +
                        `@${username}, this issue is similar to:\n\n` +
                        `#${duplicateIssue.number} (${duplicateIssue.state})\n\n` +
                        `Please review it to see if your request is already tracked. ` +
                        `If your issue is different, please update the title and description to clarify.`
                });

                await github.rest.issues.addLabels({
                  owner, repo, issue_number, labels: ['duplicate']
                });
              }
            } else {
              // No duplicate detected. Check if it was previously flagged as duplicate.
              const currentLabels = (issue.labels || []).map(l => typeof l === 'string' ? l : l.name);
              if (currentLabels.includes('duplicate')) {
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo, issue_number, per_page: 100
                });
                const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Possible Duplicate Issue Detected'));
                if (botComment) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number, name: 'duplicate'
                    });
                    await github.rest.issues.createComment({
                      owner, repo, issue_number,
                      body: `@${username}, the duplicate flag has been removed following your updates.`
                    });
                    core.info(`Duplicate flag removed from #${issue_number}`);
                  } catch (err) {
                    core.warning(`Failed to remove duplicate label: ${err.message}`);
                  }
                }
              }
            }

            core.info('Issue validation complete.');
