name: "Auto-Assign Issue Opener & Smart Onboarding"

# ─────────────────────────────────────────────────────────────────────────────
# WHEN: Fires ONLY when a new issue is opened.
# WHAT:
#   1. Auto-assigns the issue to the person who opened it.
#   2. Posts a detailed comment with:
#      - Confirmation of assignment
#      - Duplicate-check warning (including search links)
#      - Time deadline based on the issue's difficulty label
#      - Exact consequences of missing the deadline
#      - How to avoid unassignment (progress update or draft PR)
# WHY:
#   Maintainers were manually assigning every issue. This automates that step
#   while educating contributors about the workflow upfront.
# ─────────────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-open-autoflow-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-assign-and-onboard:
    runs-on: ubuntu-latest

    steps:
      - name: Auto-assign opener and post smart onboarding comment
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue   = context.payload.issue;
            const owner   = context.repo.owner;
            const repo    = context.repo.repo;
            const issueNo = issue.number;
            const opener  = issue.user.login;

            // ── 0. Ignore bots and maintainers ───────────────────────────────
            if (issue.user.type === 'Bot') {
              core.info('Bot opened this issue — skipping.');
              return;
            }

            try {
              const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: opener
              });
              if (perm.permission === 'admin' || perm.permission === 'write') {
                core.info('Maintainer/Owner opened this issue — skipping auto-assignment.');
                return;
              }
            } catch (err) {
              core.warning('Could not check permissions for @' + opener + ': ' + err.message);
            }

            // ── 1. Check if the opener already holds 3 active assignments ──
            const assigned = await github.rest.issues.listForRepo({
              owner, repo,
              assignee: opener,
              state: 'open',
              per_page: 100
            });
            const activeIssues = assigned.data.filter(i => !i.pull_request && i.number !== issueNo);

            if (activeIssues.length >= 3) {
              const list = activeIssues
                .slice(0, 5)
                .map(i => '- #' + i.number + ': ' + i.title)
                .join('\n');

              const capMsg = [
                'Issue Closed.',
                '',
                `@${opener}, you currently have ${activeIssues.length} open issues assigned to you without an active PR:`,
                '',
                list,
                '',
                'You cannot raise more than 3 issues at once while your current assignments lack PRs.',
                'Please complete your existing tasks before raising new issues.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNo,
                body: capMsg
              });

              // NEW: Close the issue automatically
              await github.rest.issues.update({
                owner, repo, issue_number: issueNo,
                state: 'closed',
                state_reason: 'not_planned'
              });

              core.info('@' + opener + ' has ' + activeIssues.length + ' active issues. Issue #' + issueNo + ' closed.');
              return;
            }

            // ── 2. Auto-assign the opener ───────────────────────────────────
            try {
              await github.rest.issues.addAssignees({
                owner, repo,
                issue_number: issueNo,
                assignees: [opener]
              });
              core.info('Assigned #' + issueNo + ' to @' + opener);
            } catch (err) {
              core.warning('Could not assign @' + opener + ': ' + err.message);
            }

            // ── 3. Derive time deadline from labels ─────────────────────────
            const labels = (issue.labels || []).map(l =>
              (typeof l === 'string' ? l : l.name).toLowerCase()
            );

            let level      = 'intermediate';
            let maxDays    = 3;
            let warnDays   = 2;
            let levelEmoji = '\uD83D\DFE1';

            if (labels.includes('level:beginner') || labels.includes('good first issue')) {
              level      = 'beginner';
              maxDays    = 2;
              warnDays   = 1;
              levelEmoji = '\uD83D\uDFE2';
            } else if (labels.includes('level:advanced') || labels.includes('level:expert')) {
              level      = 'advanced';
              maxDays    = 5;
              warnDays   = 3;
              levelEmoji = '\uD83D\uDD34';
            } else if (labels.includes('level:intermediate')) {
              level      = 'intermediate';
              maxDays    = 3;
              warnDays   = 2;
              levelEmoji = '\uD83D\uDFE1';
            }

            // ── 4. Build the duplicate check search URL ─────────────────────
            const titleSlug = encodeURIComponent(
              (issue.title || '').replace(/\[.*?\]/g, '').trim().split(' ').slice(0, 5).join(' ')
            );
            const searchURL = 'https://github.com/' + owner + '/' + repo + '/issues?q=is%3Aissue+' + titleSlug;

            // ── 5. Compute deadline string ──────────────────────────────────
            const now        = new Date();
            const deadline   = new Date(now.getTime() + maxDays * 24 * 60 * 60 * 1000);
            const deadlineStr = deadline.toUTCString().replace(' GMT', ' UTC');

            // ── 6. Post the detailed onboarding comment ─────────────────────
            const lines = [
              `@${opener}, you have been assigned to this issue.`,
              '',
              `- **Difficulty:** \`${level}\``,
              `- **Deadline:** ${maxDays} days (\`${deadlineStr}\`)`,
              `- **Warning sent after:** ${warnDays} days of inactivity`,
              '',
              `Note: Please [search for similar issues/PRs](${searchURL}) before coding to avoid duplicate work.`,
              '',
              'To keep your assignment active, post a progress comment or open a linked Draft PR.',
              'Do not open a PR without being assigned to the issue.'
            ];

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issueNo,
              body: lines.join('\n')
            });

            core.info('Posted assignment confirmation + onboarding for @' + opener + ' on #' + issueNo);
