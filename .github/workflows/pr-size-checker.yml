name: PR Size Checker

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-pr-size:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo, number } = context.issue;
            
            // Get files changed in the PR
            const files = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: number,
              per_page: 100
            });
            
            const changedFilesCount = files.data.length;
            const threshold = 15; // Set the threshold for files changed
            
            if (changedFilesCount > threshold) {
              const warningMessage = `
              **Warning: Large Pull Request Detected**
              
              This PR modifies **${changedFilesCount} files**. 
              
              Please review the "Files changed" tab. Did you accidentally run \`git add .\` or commit files from other branches/features? 
              
              If your PR includes unrelated files, formatting changes outside your scope, or build artifacts:
              1. This PR may be rejected or delayed.
              2. Please revert the unrelated files using \`git checkout origin/main -- path/to/unrelated_file\`.
              3. Commit the reverted files to clean up your PR.
              
              *(If this is a legitimate large feature like a major refactor or i18n update, you can ignore this warning).*
              `;
              
              // Only comment if we haven't already commented on this PR
              const comments = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: number
              });
              
              const hasWarningComment = comments.data.some(comment => 
                comment.body.includes('Warning: Large Pull Request Detected')
              );
              
              if (!hasWarningComment) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: number,
                  body: warningMessage
                });
              }
            }
