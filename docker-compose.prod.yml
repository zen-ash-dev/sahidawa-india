# =============================================================================
# docker-compose.prod.yml — Production-grade orchestration for SahiDawa
#
# Usage:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Architecture:
#   Nginx (port 80) ──┬──→ web  (Next.js standalone, port 3000 — internal)
#                      ├──→ api  (Express compiled JS, port 4000 — internal)
#                      └──→ api ──→ ml (FastAPI, port 8000 — internal only)
#                              └──→ redis (port 6379 — internal only)
#
# Note: For the database, please use a hosted Supabase instance
#       or `npx supabase start` separately.
# =============================================================================

services:
  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Next.js Frontend ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Express API Backend ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml:8000
    env_file:
      - .env
    networks:
      - frontend
      - backend
    depends_on:
      redis:
        condition: service_healthy
      ml:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI ML Microservice ─────────────────────────────────
  ml:
    build:
      context: ./apps/ml
      dockerfile: Dockerfile
      target: runner
    expose:
      - "8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - MEDICINES_CSV_PATH=/data/seeds/medicines.csv
    volumes:
      - type: bind
        source: ./data/seeds/medicines.csv
        target: /data/seeds/medicines.csv
        read_only: true
        bind:
          create_host_path: false
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

# ── Networks ──────────────────────────────────────────────────
# frontend: Nginx ↔ web, Nginx ↔ api
# backend:  api ↔ ml, api ↔ redis
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  redis_data:
