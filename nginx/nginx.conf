upstream web_upstream {
    server web:3000;
    keepalive 32;
}

upstream api_upstream {
    server api:4000;
    keepalive 32;
}

# ── Rate limiting zones ──────────────────────────────────────
# Prevents abuse on public-facing API endpoints.
# 10 req/s per IP for API calls, 2 req/s for auth-sensitive routes.
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:5m    rate=2r/s;
limit_req_zone $binary_remote_addr zone=scan_limit:10m   rate=5r/s;

# ── Connection limiting ──────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Permissions-Policy         "camera=(self), microphone=(self), geolocation=(self)" always;

    # Hide Nginx version from response headers
    server_tokens off;

    # ── Client body limits ────────────────────────────────────
    # Medicine image uploads and voice recordings cap at 25 MB
    client_max_body_size       25m;
    client_body_buffer_size    256k;
    client_header_buffer_size  4k;
    large_client_header_buffers 4 16k;

    # ── Connection limits per IP ──────────────────────────────
    limit_conn conn_limit 50;

    # ── Proxy timeouts (ML inference can take up to 120s) ────
    proxy_connect_timeout  30s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # ── Proxy buffering ──────────────────────────────────────
    proxy_buffering        on;
    proxy_buffer_size      8k;
    proxy_buffers          16 16k;

    # ── API Backend (/api) ────────────────────────────────────
    # Requests to /api/* are forwarded to the Express backend.
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Voice & Scan API (higher timeout, lower rate) ─────────
    location /api/voice/ {
        limit_req zone=scan_limit burst=5 nodelay;

        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support for voice streaming
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Voice inference needs extra time
        proxy_read_timeout 180s;
    }

    location /api/scan/ {
        limit_req zone=scan_limit burst=10 nodelay;

        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Image uploads may be large
        client_max_body_size 10m;
    }

    # ── Health endpoint (no rate limit) ───────────────────────
    location = /health {
        proxy_pass         http://api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Nginx self-health (for Docker HEALTHCHECK) ────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── Static file caching (immutable hashed assets) ─────────
    location /_next/static/ {
        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            365d;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # ── PWA assets (service worker, manifest, icons) ──────────
    location ~* ^/(sw\.js|manifest\.json|icons/) {
        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        add_header         Cache-Control "public, max-age=3600";
    }

    # ── Next.js Frontend (everything else) ────────────────────
    location / {
        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Gzip compression ─────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/wasm;

    # ── Custom error pages ────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
